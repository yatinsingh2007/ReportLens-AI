version: 2
updates:
  # Backend dependencies (Node.js)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Frontend dependencies (if present)
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Docker (OCR service)
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
