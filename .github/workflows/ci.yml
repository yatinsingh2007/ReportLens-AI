name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build OCR Docker image
        run: docker build -t reportlens-ocr:latest ./server

      - name: Run OCR container
        env:
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_URL: ${{ secrets.GEMINI_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: docker run -d -p $BACKEND_PORT:$BACKEND_PORT -e DATABASE_URL="$DATABASE_URL" -e GEMINI_API_KEY="$GEMINI_API_KEY" -e GEMINI_URL="$GEMINI_URL" -e JWT_SECRET="$JWT_SECRET" -e PORT="$BACKEND_PORT" --name ocr-test-container reportlens-ocr:latest

      - name: Wait for server startup
        run: sleep 8

      - name: Verify server health
        env:
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
        run: |
          if curl -f http://localhost:$BACKEND_PORT/health; then
            echo "Server running"
          else
            echo "Server failed"
            docker logs ocr-test-container
            exit 1
          fi

      - name: Cleanup container
        if: always()
        run: |
          docker stop ocr-test-container || true
          docker rm ocr-test-container || true